<!doctype html>
<html lang="en" data-theme="argus">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus Presenter — Control</title>
<style>
  :root{--bg:#0a0e1c;--panel:rgba(10,16,32,.6);--line:#21314f;--ink:#cfe9ff;--dim:#8ab;--ok:#22e5a0;--warn:#ffb454;--danger:#ff6b6b;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:13px/1.45 'Segoe UI',system-ui,sans-serif;}
  body{display:grid;grid-template-columns:1fr 320px;grid-template-rows:auto 1fr;gap:10px;padding:10px;box-sizing:border-box;height:100vh;}
  h1{grid-column:1/3;margin:0;font-size:15px;letter-spacing:.04em;display:flex;align-items:center;gap:10px;}
  #status{font-size:.72rem;color:var(--dim);display:flex;align-items:center;gap:5px;}
  #led{display:inline-block;width:9px;height:9px;border-radius:50%;background:#c33;}#led.on{background:var(--ok);}
  /* Top-right Settings button (green connectivity dot doubles as the settings entry — mirrors presenter.html) */
  #led-btn{position:fixed;top:4px;right:6px;z-index:60;background:none;border:0;padding:8px;cursor:pointer;line-height:0;border-radius:8px;}
  #led-btn:hover{background:rgba(255,255,255,.06);}
  #led2{display:block;width:10px;height:10px;border-radius:50%;background:#cc3333;box-shadow:0 0 8px #cc3333;}
  #led2.on{background:var(--ok);box-shadow:0 0 8px var(--ok);}
  #ap-config{position:fixed;top:34px;right:8px;z-index:61;width:242px;background:rgba(6,10,24,.96);border:1px solid #2a3a5a;border-radius:8px;padding:10px 12px;color:var(--ink);display:none;box-shadow:0 6px 24px rgba(0,0,0,.5);}
  #ap-config.open{display:block;}
  #ap-config h4{margin:0 0 6px;font-size:11px;letter-spacing:.12em;color:#6cf;text-transform:uppercase;}
  #ap-config .row{display:flex;gap:4px;align-items:center;margin:5px 0;flex-wrap:wrap;}
  #ap-config .k{color:var(--dim);}
  #ap-config .rd{font-size:11px;opacity:.85;margin:2px 0 6px;}
  #ap-config input{flex:1 1 90px;min-width:80px;}
  #cfg-hint{font-size:11px;color:var(--warn);flex-basis:100%;margin:0 0 2px;}
  #cfg-msg{font-size:11px;color:var(--danger);flex-basis:100%;margin:0;min-height:13px;}
  .col{min-height:0;overflow:auto;display:flex;flex-direction:column;gap:10px;}
  section{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--panel);}
  section h2{margin:0 0 8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
  input,select,textarea,button{font:inherit;background:#0d1633;color:var(--ink);border:1px solid #2a3a5a;border-radius:6px;padding:5px 8px;}
  button{cursor:pointer;background:#12234a;}button:hover{border-color:var(--ok);color:#fff;}
  button.primary{background:#173a2e;border-color:var(--ok);}
  button:disabled{opacity:.4;cursor:default;}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .badge{font-size:10px;padding:1px 6px;border-radius:10px;border:1px solid #2a3a5a;color:var(--dim);}
  .badge.ok{color:var(--ok);border-color:var(--ok);}.badge.warn{color:var(--warn);border-color:var(--warn);}
  #nowplaying{display:flex;gap:10px;align-items:center;}
  #preview{width:150px;height:98px;border:1px solid #2a3a5a;border-radius:6px;overflow:hidden;background:#050510;flex:0 0 auto;position:relative;}
  #preview iframe{border:0;width:600px;height:392px;transform:scale(.25);transform-origin:top left;pointer-events:none;}
  #preview .pvlabel{position:absolute;left:0;right:0;bottom:0;font-size:9px;text-align:center;background:rgba(0,0,0,.6);color:var(--dim);padding:1px;}
  #pvwarn{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#160c05;text-align:center;}
  #pvwarn .pvwarn-main{font-size:11px;color:var(--warn);}
  #pvwarn .pvwarn-sub{font-size:9px;color:var(--dim);}
  #livepreview-lbl{font-size:10px;color:var(--dim);display:inline-flex;align-items:center;gap:3px;cursor:pointer;}
  #np-meta{font-size:12px;}#np-meta b{color:#fff;}
  #viewingas{font-size:11px;color:var(--warn);}
  .sec{border:1px solid #1c2a44;border-radius:6px;margin:5px 0;}
  .sec>summary{cursor:pointer;padding:5px 8px;font-weight:600;list-style:none;display:flex;justify-content:space-between;gap:8px;}
  .sec>summary::-webkit-details-marker{display:none;}
  .sec .cnt{font-size:10px;color:var(--dim);font-weight:400;}
  .seq{margin:3px 0 3px 12px;border-left:1px solid #16223a;}
  .seq>summary{cursor:pointer;padding:3px 8px;font-weight:500;font-size:11px;list-style:none;display:flex;justify-content:space-between;gap:8px;color:var(--dim);}
  .seq>summary::-webkit-details-marker{display:none;}
  .seq .cnt{font-size:9px;color:var(--dim);font-weight:400;}
  .seq .beat{padding-left:28px;}
  .beat{padding:3px 8px 3px 20px;font-size:12px;cursor:pointer;border-left:2px solid transparent;color:var(--dim);}
  .beat:hover{color:#fff;}
  .beat.cur{border-left-color:var(--ok);color:#fff;background:rgba(34,229,160,.08);}
  .beat.rec{border-left-color:var(--warn);color:var(--warn);background:rgba(255,180,84,.06);}
  .beat .recnote{font-size:9px;color:var(--warn);margin-left:4px;}
  .beat .comp{font-size:9px;opacity:.6;}
  #autofollow-lbl{font-size:11px;color:var(--dim);display:inline-flex;align-items:center;gap:3px;margin-left:6px;cursor:pointer;}
  #users{max-height:290px;overflow:auto;}
  .user{display:flex;gap:6px;align-items:center;padding:4px 6px;border-radius:5px;cursor:pointer;border:1px solid transparent;}
  .user:hover{border-color:#2a3a5a;}
  .user.sel{border-color:var(--warn);background:rgba(255,180,84,.08);}
  .user .u-role{font-size:9px;padding:0 5px;border-radius:8px;border:1px solid #2a3a5a;color:var(--dim);}
  .user .u-meta{font-size:10px;color:var(--dim);margin-left:auto;text-align:right;}
  .cp{cursor:copy;border-bottom:1px dotted #456;}.cp:hover{color:#fff;}
  .cp.copied,.u-copy.copied{color:var(--ok);border-color:var(--ok);}
  .u-copy{cursor:copy;opacity:.5;margin-left:4px;}.u-copy:hover{opacity:1;color:var(--ok);}
  .u-reset{cursor:pointer;opacity:.5;margin-left:4px;font-size:9px;}.u-reset:hover{opacity:1;color:var(--ok);}
  .mini{font-size:11px;padding:3px 6px;}
  textarea{width:100%;box-sizing:border-box;min-height:40px;}
</style>
</head>
<body>
<button id="led-btn" title="Settings" aria-haspopup="true" aria-label="Connection and settings"><span id="led2"></span></button>
<div id="ap-config" role="dialog" aria-label="Settings">
  <h4>Control · Settings</h4>
  <div class="rd" id="cfg-readout"></div>
  <div class="row" id="cfg-authgroup" style="display:none">
    <div id="cfg-hint">🔒 enter presenter password to take control</div>
    <input id="cfg-pw" type="password" placeholder="presenter password" autocomplete="off">
    <button id="cfg-go" class="primary">Unlock</button>
    <div id="cfg-msg"></div>
  </div>
  <div class="row" style="margin-top:8px"><button id="cfg-close">Close</button></div>
</div>
<h1>◉ Argus Presenter — Control
  <span id="status"><span id="led"></span><span id="statustext">connecting…</span></span></h1>

<div class="col">
  <section>
    <h2>Now playing</h2>
    <div id="nowplaying">
      <div style="display:flex;flex-direction:column;gap:3px;flex:0 0 auto">
        <div id="preview"><iframe id="pvframe" sandbox="allow-scripts"></iframe><div class="pvlabel" id="pvlabel">idle</div><div id="pvwarn"><div class="pvwarn-main">⚠ preview paused</div><div class="pvwarn-sub">system busy</div></div></div>
        <label id="livepreview-lbl" title="live 'view-as' thumbnail — first thing dropped when the tab is busy"><input type="checkbox" id="livepreview" checked> live preview</label>
      </div>
      <div>
        <div id="np-meta">Showing: <b id="np-what">idle (branding)</b></div>
        <div id="viewingas"></div>
        <div class="row" style="margin-top:6px">
          <button class="mini" id="btn-start" disabled>▶ Start</button>
          <button class="mini" id="btn-prev" disabled>◀ Prev</button>
          <button class="mini" id="btn-next" disabled>Next ▶</button>
          <button class="mini" id="btn-home">⌂ Home</button>
          <button class="mini" id="btn-end">■ STOP</button>
          <label id="autofollow-lbl" title="auto-advance to the branch-recommended next beat when a player answers"><input type="checkbox" id="autofollow"> ⛓ auto-follow branch</label>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>Module</h2>
    <div class="row">
      <select id="series-select" style="flex:1 1 auto"><option value="">— series —</option></select>
      <button id="series-next" class="mini" disabled title="queue the next module in the series">Next in series ▶</button>
    </div>
    <div class="row" style="margin-top:6px">
      <select id="mod-select" style="flex:1 1 auto"><option value="">— select a module —</option></select>
      <button id="mod-refresh" class="mini" title="rescan">⟳</button>
    </div>
    <div id="mod-info" style="margin-top:6px;font-size:12px;color:var(--dim)"></div>
    <div class="row" style="margin-top:6px">
      <button id="mod-load" class="primary" disabled>Validate &amp; Load</button>
      <span id="mod-valid"></span>
    </div>
    <div id="outline" style="margin-top:8px"></div>
  </section>

  <section>
    <h2>Ad-hoc push</h2>
    <div class="row"><input id="pc-component" value="card" style="width:110px"><input id="pc-target" value="all" style="width:80px" title="target"><button id="pc-push">Push</button></div>
    <textarea id="pc-opts">{"title":"Hello"}</textarea>
    <div class="row"><button id="op-open" class="mini">Open poll</button><input id="op-id" value="p1" style="width:50px"><input id="op-prompt" value="Ship it?" style="width:110px"><input id="op-options" value="yes,no" style="width:90px"><button id="op-close" class="mini">Close</button></div>
  </section>
</div>

<div class="col">
  <section>
    <h2>Users <span class="badge" id="user-count">0</span></h2>
    <div class="row" style="margin-bottom:6px"><button class="mini sel" id="view-all">View: ALL (default)</button></div>
    <div id="users"></div>
  </section>
</div>

<script type="module">
import { resolveNext } from '/branch.mjs';   // DEL-2: SINGLE-SOURCE branch resolver (served by the server, not duplicated)
(function(){
  var NS='argus-presenter', TOKEN_KEY=NS+':token';
  var q = new URLSearchParams(location.search);
  var identity = { userId: q.get('userId')||'ctl', userName: q.get('name')||'Control', role: q.get('role')||'presenter' };
  // AUTH-1/P5.5 token precedence: URL ?token= wins (P5 overlay path); else a persisted
  // unlock token from localStorage (so a refresh stays authed).
  if(q.get('token')) identity.token = q.get('token');
  else { try{ var _t=localStorage.getItem(TOKEN_KEY); if(_t) identity.token=_t; }catch(e){} }
  // AUTH-ROLE (P5.5): is the presenter role gated, and what public salt do we hash with?
  // Default UNGATED on fetch failure. effRole = the server's EFFECTIVE granted role (from welcome).
  var authGated=false, authSeed=NS, effRole=null, attempting=false;
  var ws=null, module=null, curBeat=-1, recBeat=-1, users=[], viewingAs=null, results={};
  var seriesModules=[], seriesPos=-1;   // SCH-2: active series (ordered module ids) + walk position
  // MON-2: live "view-as" thumbnail — luxury feature, first thing sacrificed under load.
  var livePreview=true, degraded=false, lastDisplay={}, monLastTick=0, monLate=0, monOnTime=0;
  var $=function(id){return document.getElementById(id);};

  function control(action,args){ if(ws&&ws.readyState===1) ws.send(JSON.stringify({t:'control',action:action,args:args||{}})); }
  function connect(){
    ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
    ws.onopen=function(){ $('led').classList.add('on'); if($('led2'))$('led2').classList.add('on'); $('statustext').textContent='connected · '+identity.userName; ws.send(JSON.stringify(Object.assign({t:'hello'},identity))); };
    ws.onclose=function(){ $('led').classList.remove('on'); if($('led2'))$('led2').classList.remove('on'); $('statustext').textContent='disconnected'; renderConfig(); setTimeout(connect,800); };
    ws.onmessage=onMsg;
  }
  function onMsg(ev){ var m; try{m=JSON.parse(ev.data);}catch(e){return;}
    if(m.t==='ping'){ ws.send(JSON.stringify({t:'pong',ts:m.ts})); return; }
    if(m.t==='welcome'){ onWelcome(m); return; }   // P5.5: effective granted role (downgrade → unlock)
    if(m.t==='presence'){ users=m.users||[]; renderUsers(); onPresenceRefresh(); return; }
    if(m.t==='mirror'){ onMirror(m); return; }   // MON-2: target user's live display html
    if(m.t==='content'){ renderPreview(m.html, m.contentId); return; }
    if(m.t==='clear'){ renderPreview(null,'idle'); return; }
    if(m.t==='result'){ results[m.promptId]=results[m.promptId]||{}; results[m.promptId][m.userId]={type:m.type,value:m.value}; maybeBranch(m); return; }
    if(m.t==='host'&&m.msg&&m.msg.type==='diff'&&m.msg.diff&&('module/current' in m.msg.diff)){ curBeat=m.msg.diff['module/current']; recBeat=-1; renderOutline(); renderNav(); }
    if(m.t==='module-changed'){ onModuleChanged(m.id); return; }   // AUT-2: hot-reload notice
  }

  // AUT-2: a module file changed on disk. Always refresh the <select> list (reflect new/
  // renamed/changed modules); if the CURRENTLY-selected module changed, show a subtle
  // note rather than clobbering the loaded module (GM re-selects to reload).
  function onModuleChanged(id){
    var wasSelected = ($('mod-select').value===id);
    refreshModules();   // rebuilds the option list; preserves the current selection
    if(wasSelected){ $('mod-info').textContent='↻ this module changed on disk — re-select to reload'; }
  }

  function renderPreview(html, label){
    var f=$('pvframe');
    if(html==null){ f.srcdoc='<body style="margin:0;background:#050510"></body>'; }
    else if(html!==undefined){ f.srcdoc=html; }
    if(label!==undefined) $('pvlabel').textContent=label||'—';
    var who = viewingAs ? ('as '+viewingAs) : 'default (ALL)';
    $('np-what').textContent = ($('pvlabel').textContent||'idle') + ' · ' + who;
  }

  function refreshModules(){
    var sel=$('mod-select'); var keep=sel.value;   // preserve selection across the async rebuild
    fetch('/api/modules').then(function(r){return r.json();}).then(function(list){
      sel.innerHTML='<option value="">— select a module —</option>';
      list.forEach(function(m){ var o=document.createElement('option'); o.value=m.id;
        o.textContent=m.title+' — '+m.beats+' beats/'+m.sections+' sec'+(m.warn?(' ⚠'+m.warn):'')+(m.error?' (ERR)':''); sel.appendChild(o); });
      if(keep){ try{ sel.value=keep; }catch(e){} }
    }).catch(function(){ $('mod-info').textContent='(module list unavailable)'; });
  }
  $('mod-select').onchange=function(){ var id=this.value; module=null; curBeat=-1; $('mod-valid').innerHTML=''; $('outline').innerHTML=''; renderNav();
    if(!id){ $('mod-info').textContent=''; $('mod-load').disabled=true; return; }
    fetch('/api/modules/'+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(d){
      if(!d||d.error||!d.module){ $('mod-info').textContent='Error: '+((d&&d.error)||'could not load module'); $('mod-load').disabled=true; return; }
      module=d.module; var v=d.validation||{warn:0,info:0};
      $('mod-info').textContent=(module.manifest&&module.manifest.summary)||'';
      $('mod-valid').innerHTML = v.warn? '<span class="badge warn">⚠ '+v.warn+' warnings</span>' : '<span class="badge ok">✓ valid</span>';
      $('mod-load').disabled=false; renderOutline();
    }).catch(function(){ $('mod-info').textContent='Error loading module'; $('mod-load').disabled=true; });
  };
  $('mod-load').onclick=function(){ if(!module) return; control('load_module',{module:module}); curBeat=-1; renderNav(); $('btn-start').disabled=false; };
  $('mod-refresh').onclick=refreshModules;

  // SCH-2: Series picker — the level above Module. Choosing a series queues its first module
  // into #mod-select (the GM still clicks Validate&Load per module); "Next in series ▶" advances.
  function refreshSeries(){
    var sel=$('series-select'); if(!sel) return; var keep=sel.value;
    fetch('/api/series').then(function(r){return r.json();}).then(function(list){
      sel.innerHTML='<option value="">— series —</option>';
      (list||[]).forEach(function(s){ var o=document.createElement('option'); o.value=s.id; o.textContent=s.title+' ('+s.count+')'; sel.appendChild(o); });
      if(keep){ try{ sel.value=keep; }catch(e){} }
    }).catch(function(){});
  }
  function updateSeriesNav(){ var b=$('series-next'); if(b) b.disabled = !(seriesModules.length && seriesPos < seriesModules.length-1); }
  // Point #mod-select at module id `mid` and trigger its onchange (fetch+validate), ready to Load.
  function queueModule(mid){ var ms=$('mod-select'); if(!ms) return; ms.value=mid; if(ms.onchange) ms.onchange(); }
  $('series-select').onchange=function(){ var id=this.value; seriesModules=[]; seriesPos=-1; updateSeriesNav();
    if(!id) return;
    fetch('/api/series/'+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(d){
      if(!d||d.error||!d.series){ return; }
      seriesModules=(d.series.moduleIds||[]).slice(); seriesPos=seriesModules.length?0:-1; updateSeriesNav();
      if(seriesModules.length) queueModule(seriesModules[0]);
    }).catch(function(){});
  };
  $('series-next').onclick=function(){ if(!(seriesModules.length && seriesPos < seriesModules.length-1)) return;
    seriesPos++; queueModule(seriesModules[seriesPos]); updateSeriesNav();
  };

  function beatById(id){ return (module.beats||[]).find(function(b){return b.id===id;}); }
  function beatIndex(id){ return (module.beats||[]).findIndex(function(b){return b.id===id;}); }
  // DEL-3: build one .beat row (same cur/rec/label/onclick logic) — shared by section- and sequence-level rendering.
  function beatRow(bid){ var b=beatById(bid); if(!b) return null; var i=beatIndex(bid);
    var el=document.createElement('div'); el.className='beat'+(i===curBeat?' cur':'')+(i===recBeat&&i!==curBeat?' rec':''); el.dataset.i=i;
    el.innerHTML=(((b.opts&&(b.opts.title||b.opts.prompt||b.opts.text))||b.id)+'').slice(0,42)+' <span class="comp">'+b.component+(b.target?(' →'+b.target):'')+'</span>'+((i===recBeat&&i!==curBeat)?' <span class="recnote">→ recommended</span>':'');
    el.onclick=function(){ recBeat=-1; control('show_beat',{index:i}); };   // manual override always works + clears the recommendation
    return el; }
  // SCH-1: format a duration estimate. <60s → "~Ns"; else round to nearest minute → "~N min".
  function fmtDur(sec){ return sec<60 ? '~'+sec+'s' : '~'+Math.round(sec/60)+' min'; }
  function beatDur(bid){ var b=beatById(bid); var d=b&&b.durationSec; return (typeof d==='number'&&isFinite(d))?d:0; }
  function secDur(s){ var ids = (s.sequences&&s.sequences.length) ? s.sequences.reduce(function(a,q){return a.concat(q.beatIds||[]);},[]) : (s.beatIds||[]); return ids.reduce(function(n,bid){return n+beatDur(bid);},0); }
  function renderOutline(){
    if(!module){ $('outline').innerHTML=''; return; }
    var secs = module.sections && module.sections.length ? module.sections : [{title:'(all beats)',beatIds:(module.beats||[]).map(function(b){return b.id;})}];
    $('outline').innerHTML='';
    // SCH-1: only roll up estimates when at least one beat carries a numeric durationSec.
    var anyDur = (module.beats||[]).some(function(b){ return typeof b.durationSec==='number'&&isFinite(b.durationSec); });
    if(anyDur){
      var total = (module.beats||[]).reduce(function(n,b){ return n+((typeof b.durationSec==='number'&&isFinite(b.durationSec))?b.durationSec:0); },0);
      var est=document.createElement('div'); est.className='outline-est'; est.style.cssText='font-size:11px;opacity:.7;margin-bottom:4px'; est.textContent='est. '+fmtDur(total);
      $('outline').appendChild(est);
    }
    secs.forEach(function(s){
      var det=document.createElement('details'); det.className='sec'; det.open=true;
      // DEL-3: a section with a non-empty sequences[] renders a nested Sequence tier; otherwise its beatIds render directly.
      var hasSeq = s.sequences && s.sequences.length;
      var secCount = hasSeq ? s.sequences.reduce(function(n,q){return n+(q.beatIds||[]).length;},0) : (s.beatIds||[]).length;
      var estStr = ''; if(anyDur){ var sd=secDur(s); if(sd>0) estStr=' · '+fmtDur(sd); }
      var sum=document.createElement('summary'); sum.innerHTML='<span>'+(s.title||'section')+'</span><span class="cnt">'+secCount+' beats'+estStr+'</span>';
      det.appendChild(sum);
      if(hasSeq){
        s.sequences.forEach(function(q){
          var qdet=document.createElement('details'); qdet.className='seq'; qdet.open=true;
          var qsum=document.createElement('summary'); qsum.innerHTML='<span>'+(q.title||'sequence')+'</span><span class="cnt">'+(q.beatIds||[]).length+' beats</span>';
          qdet.appendChild(qsum);
          (q.beatIds||[]).forEach(function(bid){ var el=beatRow(bid); if(el) qdet.appendChild(el); });
          det.appendChild(qdet);
        });
      } else {
        (s.beatIds||[]).forEach(function(bid){ var el=beatRow(bid); if(el) det.appendChild(el); });
      }
      $('outline').appendChild(det);
    });
  }
  function renderNav(){ var on=!!module; $('btn-prev').disabled=!on||curBeat<=0; $('btn-next').disabled=!on; }
  // DEL-2: branch-table navigation. When a player answers the CURRENT beat, use the
  // shared resolveNext to recommend/auto-advance to the next beat. Recompute per result.
  function maybeBranch(m){
    if(!module||curBeat<0) return;
    var cur=(module.beats||[])[curBeat];
    if(!cur||m.type!=='answer'||m.promptId!==cur.promptId) return;   // only the CURRENT beat's answers
    var nextId=resolveNext(cur,{value:m.value},{});                  // flags {} — ifFlag routing deferred
    if(!nextId) return;                                              // linear/no-branch beat → no recommendation
    var i=beatIndex(nextId); if(i<0) return;
    if($('autofollow').checked){ recBeat=-1; control('show_beat',{id:nextId}); }   // auto-advance (server diff clears rec + re-renders)
    else { recBeat=i; renderOutline(); }                             // else just highlight the recommended next
  }
  $('btn-start').onclick=function(){ recBeat=-1; control('show_beat',{index:0}); };
  $('btn-prev').onclick=function(){ recBeat=-1; control('prev_beat',{}); };
  $('btn-next').onclick=function(){ recBeat=-1; control('next_beat',{}); };
  $('btn-home').onclick=function(){ recBeat=-1; control('show_default',{}); };   // DEF-1: back to the module title page
  $('btn-end').onclick=function(){ control('clear',{target:'all'}); };           // STOP → branding (reuses clear)

  function copyText(t,el){ try{ if(navigator.clipboard) navigator.clipboard.writeText(t); }catch(e){} if(el){ el.classList.add('copied'); setTimeout(function(){el.classList.remove('copied');},700);} }
  function esc(s){ return (s==null?'':(''+s)).replace(/"/g,'&quot;'); }
  function renderUsers(){
    $('user-count').textContent=users.length;
    var box=$('users'); box.innerHTML='';
    users.forEach(function(u){
      var el=document.createElement('div'); el.className='user'+(viewingAs===u.userId?' sel':'');
      var seen = u.lastSeen ? (((Date.now()-u.lastSeen)/1000)|0)+'s' : '';
      var rowText=[u.userId,u.userName,u.ip,u.role,u.socketId].join('\t');
      el.innerHTML='<span class="u-role">'+u.role+'</span>'
        +'<b class="cp" data-copy="'+esc(u.userId)+'" title="copy userId">'+esc(u.userName||u.userId)+'</b>'
        +'<span class="u-meta"><span class="cp" data-copy="'+esc(u.ip||'')+'" title="copy IP">'+esc(u.ip||'—')+'</span>'
        +' <span class="cp" data-copy="'+esc(u.socketId)+'" title="copy socketId">'+esc(u.socketId)+'</span>'
        +'<br>sees: '+esc(u.display||'—')+(seen?(' · '+seen):'')
        +' <span class="u-copy" data-copy="'+esc(rowText)+'" title="copy row">⧉</span>'
        +' <span class="u-reset" data-reset="'+esc(u.userId)+'" title="reset to default (follow role display)">↺ default</span></span>';
      el.onclick=function(){ selectView(u.userId); };
      box.appendChild(el);
    });
    [].forEach.call(box.querySelectorAll('[data-copy]'),function(c){ c.onclick=function(e){ e.stopPropagation(); copyText(c.getAttribute('data-copy'), c); }; });
    [].forEach.call(box.querySelectorAll('[data-reset]'),function(c){ c.onclick=function(e){ e.stopPropagation(); control('reset_user',{userId:c.getAttribute('data-reset')}); }; });
  }
  function selectView(uid){ viewingAs=uid; $('view-all').classList.remove('sel'); renderUsers();
    var u=users.find(function(x){return x.userId===uid;});
    renderPreview(undefined,(u&&u.display)||'—');
    $('viewingas').textContent='▶ viewing as '+uid+' — they see: '+((u&&u.display)||'—')+'  (click ALL to return)';
    lastDisplay[uid]=(u&&u.display)||null;
    requestMirror();   // MON-2: pull THEIR actual display into the thumbnail
  }
  $('view-all').onclick=function(){ viewingAs=null; this.classList.add('sel'); renderUsers(); $('viewingas').textContent=''; };

  // ---- MON-2: live "view-as" thumbnail (lightweight, event-driven, gracefully degrading) ----
  function requestMirror(){ if(viewingAs && livePreview && !degraded) control('mirror',{userId:viewingAs}); }
  function onMirror(m){
    if(m.userId!==viewingAs || !livePreview || degraded) return;   // stale / paused → drop
    if(m.html==null){ renderPreview(null, m.userId+"'s view · idle"); }
    else { renderPreview(m.html, m.userId+"'s view"); }
    // keep the reverse-link note (set by selectView / presence)
  }
  // Refresh trigger #2: the watched user's display CHANGED (event-driven, never a timer).
  function onPresenceRefresh(){
    if(!viewingAs) return;
    var u=users.find(function(x){return x.userId===viewingAs;});
    var d=(u&&u.display)||null;
    if(d!==lastDisplay[viewingAs]){ lastDisplay[viewingAs]=d; requestMirror(); }
  }
  // Swap the live iframe for a same-size warning box when paused/starved (nothing else changes).
  function applyPreviewState(){
    var off = degraded || !livePreview;
    var warn=$('pvwarn'), f=$('pvframe'), lbl=$('pvlabel');
    if(off){
      // CLEAR the iframe content so any animation (requestAnimationFrame) actually STOPS and CPU is
      // reclaimed — visibility:hidden alone keeps the iframe's rAF loop running (paints nothing, still burns CPU).
      f.srcdoc='<body style="margin:0;background:#050510"></body>';
      f.style.visibility='hidden'; lbl.style.visibility='hidden'; warn.style.display='flex';
      warn.querySelector('.pvwarn-sub').textContent = degraded ? 'system busy' : 'off';
    } else {
      warn.style.display='none'; f.style.visibility=''; lbl.style.visibility='';
      requestMirror();   // returning to live → re-pull the current view-as
    }
  }
  $('livepreview').onchange=function(){ livePreview=this.checked; applyPreviewState(); };
  // Cheap 1 Hz SELF-monitor: measures its own lateness (tab starvation), NOT a render loop.
  setInterval(function(){
    var now=performance.now();
    if(monLastTick){
      var gap=now-monLastTick;
      if(gap>1800){ monLate++; monOnTime=0; if(monLate>=2 && !degraded){ degraded=true; applyPreviewState(); } }
      else if(gap<1300){ monOnTime++; monLate=0; if(monOnTime>=3 && degraded){ degraded=false; applyPreviewState(); } }
      else { monLate=0; }
    }
    monLastTick=now;
  },1000);

  $('pc-push').onclick=function(){ var o={}; try{o=JSON.parse($('pc-opts').value||'{}');}catch(e){} control('push_component',{component:$('pc-component').value,opts:o,target:$('pc-target').value}); };
  $('op-open').onclick=function(){ var opts=$('op-options').value.split(',').map(function(s){s=s.trim();return{label:s,value:s};}); control('open_poll',{promptId:$('op-id').value,prompt:$('op-prompt').value,options:opts,target:'participant',resultsTarget:'presenter'}); };
  $('op-close').onclick=function(){ control('close_poll',{promptId:$('op-id').value}); };

  // ---- Settings config panel + AUTH-ROLE (P5.5) ---------------------------------------
  // control.html connects as role:'presenter', but opened as its own tab it carries no
  // credential — a GATED server silently downgrades it to participant, so pushPresence
  // never feeds it and it sees NO users. The green-dot settings panel exposes an inline
  // password unlock: hash sha256(seed+pw) in the browser, send only the hash as the hello
  // token, reconnect, and the presence feed arrives.
  function renderConfig(){
    var ro=$('cfg-readout'); if(!ro) return;
    var linked=(ws&&ws.readyState===1);
    ro.innerHTML='<span class="k">you</span> '+identity.userName+' ('+identity.userId+')<br>'
      +'<span class="k">role</span> '+(effRole||identity.role)+' · <span class="k">link</span> '+(linked?'connected':'offline')
      +(authGated?' · <span class="k">gated</span> yes':'');
    // Show the unlock group only when the server is gated AND we were downgraded (not presenter).
    var needUnlock = authGated && effRole && effRole!=='presenter';
    $('cfg-authgroup').style.display = needUnlock ? '' : 'none';
  }
  function toggleConfig(open){ var p=$('ap-config'); var show=(open===undefined)?!p.classList.contains('open'):open; p.classList.toggle('open',show); if(show) renderConfig(); }
  $('led-btn').addEventListener('click',function(e){ e.stopPropagation(); toggleConfig(); });
  $('ap-config').addEventListener('click',function(e){ e.stopPropagation(); });
  document.addEventListener('click',function(){ toggleConfig(false); });
  // KBD-1 (Plan 0456 P1): ONE document-level keyboard transport handler.
  // Space/ArrowRight → Next · ArrowLeft → Prev · Escape → close config if open (takes
  // precedence, preserves the old Escape-closes-config behavior) else STOP · digits 1–9 →
  // first beat of section N. Keys route through the EXISTING buttons / beat-jump path
  // (control('show_beat')) so branch-recommendation + nav-state logic stays single-source.
  // Guards: never hijack typing (input/textarea/select/contenteditable), ignore modified
  // keys, no-op on disabled buttons / no module; preventDefault on Space only when handled.
  document.addEventListener('keydown',function(e){
    if(e.ctrlKey||e.altKey||e.metaKey) return;
    var t=e.target, tag=t&&t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||(t&&t.isContentEditable)) return;
    if(e.key===' '||e.key==='ArrowRight'){ var nb=$('btn-next'); if(!nb.disabled){ if(e.key===' ') e.preventDefault(); nb.click(); } return; }
    if(e.key==='ArrowLeft'){ var pb=$('btn-prev'); if(!pb.disabled) pb.click(); return; }
    if(e.key==='Escape'){ if($('ap-config').classList.contains('open')) toggleConfig(false); else $('btn-end').click(); return; }
    if(/^[1-9]$/.test(e.key)){
      if(!module) return;
      var secs = module.sections && module.sections.length ? module.sections : [{title:'(all beats)',beatIds:(module.beats||[]).map(function(b){return b.id;})}];   // same derivation as renderOutline()
      var s=secs[(+e.key)-1]; if(!s) return;
      var ids = (s.sequences&&s.sequences.length) ? s.sequences.reduce(function(a,q){return a.concat(q.beatIds||[]);},[]) : (s.beatIds||[]);
      for(var k=0;k<ids.length;k++){ var i=beatIndex(ids[k]); if(i>=0){ recBeat=-1; control('show_beat',{index:i}); return; } }   // first RESOLVABLE beat of section N
    }
  });
  $('cfg-close').addEventListener('click',function(){ toggleConfig(false); });

  // The server echoes the EFFECTIVE granted role in `welcome`; a silent downgrade surfaces
  // as the unlock prompt (or, mid-unlock, as success/"wrong password").
  function onWelcome(m){
    effRole = (typeof m.role==='string') ? m.role : effRole;
    if(attempting){
      attempting=false;
      if(effRole==='presenter'){ var mg=$('cfg-msg'); mg.textContent='✓ unlocked'; mg.style.color='var(--ok)'; if($('cfg-pw')) $('cfg-pw').value=''; }
      else { var md=$('cfg-msg'); md.textContent='wrong password'; md.style.color='var(--danger)'; identity.token=null; try{localStorage.removeItem(TOKEN_KEY);}catch(e){} }
    }
    renderConfig();
  }
  async function computeHash(pw){
    var buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(authSeed+pw));
    return [].map.call(new Uint8Array(buf),function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }
  async function unlock(){
    var pw=($('cfg-pw').value)||'';
    try{ identity.token=await computeHash(pw); }
    catch(e){ var mg=$('cfg-msg'); mg.textContent='cannot hash (insecure context)'; mg.style.color='var(--danger)'; return; }
    try{ localStorage.setItem(TOKEN_KEY, identity.token); }catch(e){}   // persist so a refresh stays authed
    identity.role='presenter'; attempting=true;
    var m2=$('cfg-msg'); m2.textContent='unlocking…'; m2.style.color='var(--dim)';
    // Reconnect: close+reopen so a FRESH hello carries the token (onclose → setTimeout(connect)).
    if(ws && (ws.readyState===0||ws.readyState===1)){ try{ws.close();}catch(e){} }
    else connect();
  }
  $('cfg-go').addEventListener('click',function(e){ e.stopPropagation(); unlock(); });
  $('cfg-pw').addEventListener('keydown',function(e){ if(e.key==='Enter') unlock(); });

  fetch('/api/auth').then(function(r){return r.json();})
    .then(function(d){ authGated=!!(d&&d.gated); if(d&&d.seed) authSeed=d.seed; renderConfig(); })
    .catch(function(){ authGated=false; renderConfig(); });

  connect(); refreshModules(); refreshSeries();
  window.__ctlAuth = { role:function(){return effRole;}, gated:function(){return authGated;}, open:function(){return $('ap-config').classList.contains('open');} };   // test hook
  window.__control = control;   // test/automation hook (P1) — drive control ops programmatically
  window.__gm={ users:function(){return users;}, module:function(){return module;}, cur:function(){return curBeat;}, rec:function(){return recBeat;},
    setModule:function(m){ module=m; curBeat=-1; recBeat=-1; renderOutline(); renderNav(); },   // DEL-2 test/automation hook: load a module into the panel directly
    series:function(){return {mods:seriesModules.slice(),pos:seriesPos};},   // SCH-2 test hook
    degrade:function(b){ degraded=!!b; applyPreviewState(); } };   // MON-2 test hook: force the degraded state without real CPU load
})();
</script>
</body>
</html>
