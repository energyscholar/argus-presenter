<!doctype html>
<html lang="en" data-theme="argus">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus Presenter</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a1a;color:#cfe9ff;font-family:'Courier New',monospace;overflow:hidden;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;transform:scale(var(--ap-scale,1));transform-origin:center center;filter:var(--ap-filter,none);transition:transform .12s ease;}
  #frame{border:0;width:100%;height:100%;background:transparent;}
  #idle{opacity:.55;letter-spacing:.2em;font-size:.8rem;text-transform:uppercase;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
  #idle .ap-idle-brand{max-width:min(90vw,900px);max-height:90vh;width:auto;height:auto;}
  /* green connectivity dot is now a Settings button (larger hit target wraps the small dot) */
  #led-btn{position:fixed;top:4px;right:6px;z-index:60;background:none;border:0;padding:8px;cursor:pointer;line-height:0;border-radius:8px;}
  #led-btn:hover{background:rgba(255,255,255,.06);}
  #led{display:block;width:10px;height:10px;border-radius:50%;background:#cc3333;box-shadow:0 0 8px #cc3333;}
  #led.on{background:#22e5a0;box-shadow:0 0 8px #22e5a0;}
  #ap-config{position:fixed;top:34px;right:8px;z-index:61;width:236px;background:rgba(6,10,24,.96);border:1px solid #2a3a5a;border-radius:8px;padding:10px 12px;font:12px/1.4 'Courier New',monospace;color:#cfe9ff;display:none;box-shadow:0 6px 24px rgba(0,0,0,.5);}
  #ap-config.open{display:block;}
  #ap-config h4{margin:0 0 6px;font-size:11px;letter-spacing:.12em;color:#6cf;text-transform:uppercase;}
  #ap-config .row{display:flex;gap:4px;align-items:center;margin:5px 0;flex-wrap:wrap;}
  #ap-config button{background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:5px;padding:3px 7px;font:inherit;cursor:pointer;}
  #ap-config button:hover{border-color:#22e5a0;}
  #ap-config button.sel{border-color:#22e5a0;color:#fff;}
  #ap-config .k{color:#8ab;}
  #ap-config .rd{font-size:11px;opacity:.85;margin-top:8px;border-top:1px solid #1c2a44;padding-top:6px;}
  #who{position:fixed;bottom:8px;left:12px;font-size:.65rem;opacity:.4;letter-spacing:.1em;}
  #ap-chat{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;padding:6px 10px 6px 130px;background:rgba(6,10,24,.85);border-top:1px solid #1c2a44;z-index:40;}
  #ap-chat input{flex:1 1 auto;background:#0d1633;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:5px 8px;font:inherit;}
  #ap-chat input:disabled{opacity:.5;}
  #ap-chat button{background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:5px 10px;font:inherit;cursor:pointer;}
  #ap-chat button:disabled{opacity:.5;cursor:default;}
  #ap-debug{position:fixed;top:26px;right:12px;width:340px;max-height:70vh;overflow:auto;background:rgba(6,10,24,.92);
    border:1px solid #2a3a5a;border-radius:6px;padding:8px 10px;font:11px/1.35 'Courier New',monospace;color:#9fd;z-index:50;}
  #ap-debug h4{margin:0 0 4px;font-size:11px;letter-spacing:.12em;color:#6cf;text-transform:uppercase;}
  #ap-debug .k{color:#8ab;}
  #ap-debug pre{margin:4px 0;white-space:pre-wrap;word-break:break-word;color:#cfe9ff;}
  #ap-debug .msg{border-top:1px solid #1c2a44;opacity:.85;}
</style>
</head>
<body>
<button id="led-btn" title="Settings" aria-haspopup="true" aria-label="Connection and settings"><span id="led"></span></button>
<div id="ap-config" role="dialog" aria-label="Settings">
  <h4>Display</h4>
  <div class="row"><span class="k">Zoom</span> <button data-scale="0.9">90%</button><button data-scale="1">100%</button><button data-scale="1.25">125%</button><button data-scale="1.5">150%</button></div>
  <div class="row"><span class="k">Contrast</span> <button id="cfg-contrast">High-contrast: off</button></div>
  <div class="row"><span class="k">Role</span> <button id="cfg-role-user" class="sel">User</button> <button id="cfg-role-presenter">Presenter</button></div>
  <div class="rd" id="cfg-readout"></div>
  <div class="row" style="margin-top:8px"><button id="cfg-close">Close</button></div>
</div>
<div id="stage"><div id="idle"><img class="ap-idle-brand" src="/branding/argus-presenter.svg" alt="Argus Presenter — awaiting content"></div></div>
<div id="who"></div>
<div id="ap-chat"><input id="ap-chat-input" disabled placeholder="chat (disabled until a listener is attached)"><button id="ap-chat-send" disabled>Send</button></div>
<script>
(function(){
  var NS = 'argus-presenter';
  var q = new URLSearchParams(location.search);
  // Role precedence: explicit URL ?role= wins; else a role the viewer chose earlier
  // (persisted in localStorage via the Config overlay); else default participant.
  var ROLE_KEY = NS + ':role';
  var savedRole = null;
  try { savedRole = localStorage.getItem(ROLE_KEY); } catch(e){}
  var identity = {
    userId: q.get('userId') || q.get('u') || ('anon-' + Math.random().toString(36).slice(2,8)),
    userName: q.get('name') || q.get('n') || 'Guest',
    role: q.get('role') || savedRole || 'participant',
    // Token pass-through: when a PRESENTER_CONTROL_TOKEN is configured server-side,
    // ?token=… in the URL satisfies the AUTH-1 gate for a control role. Default: none (open).
    token: q.get('token') || null
  };
  function renderWho(){ document.getElementById('who').textContent = identity.role + ' · ' + identity.userName + ' (' + identity.userId + ')'; }
  renderWho();

  var stage = document.getElementById('stage');
  var led = document.getElementById('led');
  var frame = null;

  // ---- Debug overlay (?debug=1): connection, socketId, last N ops/messages, state inspector.
  var DEBUG = q.get('debug') === '1' || q.get('debug') === 'true';
  var dbg = { open: false, socketId: null, msgs: [], state: {} };
  var dbgEl = null;
  function dbgGet(path) { var o = dbg.state; (path || '').split('/').filter(Boolean).forEach(function (k) { o = (o && typeof o === 'object') ? o[k] : undefined; }); return o; }
  function dbgMerge(diff) { if (!diff || typeof diff !== 'object') return; for (var p in diff) { if (!diff.hasOwnProperty(p)) continue; var parts = p.split('/').filter(Boolean), o = dbg.state; for (var i = 0; i < parts.length - 1; i++) { if (typeof o[parts[i]] !== 'object' || o[parts[i]] === null) o[parts[i]] = {}; o = o[parts[i]]; } if (parts.length) o[parts[parts.length - 1]] = diff[p]; } }
  function dbgRender() {
    if (!DEBUG) return;
    if (!dbgEl) { dbgEl = document.createElement('div'); dbgEl.id = 'ap-debug'; document.body.appendChild(dbgEl); }
    var last = dbg.msgs.slice(-8).map(function (m) { return '<div class="msg"><span class="k">' + m.t + '</span> ' + (m.brief || '') + '</div>'; }).join('');
    dbgEl.innerHTML =
      '<h4>Argus Debug</h4>' +
      '<div><span class="k">conn</span> ' + (dbg.open ? 'open' : 'closed') + ' · <span class="k">socket</span> ' + (dbg.socketId || '—') + '</div>' +
      '<div><span class="k">role</span> ' + identity.role + ' · <span class="k">user</span> ' + identity.userId + '</div>' +
      '<h4 style="margin-top:6px">state</h4><pre>' + JSON.stringify(dbg.state, null, 1).slice(0, 1200) + '</pre>' +
      '<h4>last messages</h4>' + last;
  }
  function dbgLog(m) {
    if (!DEBUG) return;
    var brief = '';
    if (m.t === 'op' || m.t === 'diff') brief = JSON.stringify(m.diff || m.value || {}).slice(0, 80);
    else if (m.t === 'content') brief = (m.contentId || '') + '';
    else if (m.t === 'host') brief = (m.msg && m.msg.type) || '';
    dbg.msgs.push({ t: m.t, brief: brief });
    if (dbg.msgs.length > 40) dbg.msgs.shift();
    if (m.t === 'diff' && m.diff) dbgMerge(m.diff);
    if (m.t === 'host' && m.msg && m.msg.type === 'diff' && m.msg.diff) dbgMerge(m.msg.diff);
    if (m.t === 'snapshot' && m.state) dbg.state = m.state;
    dbgRender();
  }
  // Expose for tests / manual poking.
  window.__apDebug = { get: dbgGet, dump: function () { return dbg; } };

  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var ws = null;
  var lastVersion = 0;            // highest state version this client has applied (X1 resync)
  var reconnectDelay = 300, reconnectTimer = null;
  function scheduleReconnect(){
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function(){ reconnectTimer = null; connect(); }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 5000);   // backoff (X6 storm debounce)
  }
  function connect(){
    ws = new WebSocket(proto + '://' + location.host);
    ws.onopen = function(){ led.classList.add('on'); dbg.open = true; dbgRender(); reconnectDelay = 300;
      ws.send(JSON.stringify(Object.assign({ t:'hello', lastVersion:lastVersion }, identity))); };
    ws.onclose = function(){ led.classList.remove('on'); dbg.open = false; dbgRender(); scheduleReconnect(); };
    ws.onerror = function(){ /* onclose handles reconnect */ };
    ws.onmessage = onMessage;
  }

  var lastSnapshot = null;   // most recent server snapshot (relayed into new content frames)
  // F1: keep lastSnapshot CURRENT by merging live diffs into it, so a late-mounted
  // component seeds from present state (e.g. poll-results pushed AFTER votes arrived
  // shows the real tally, not 0). Path-keyed diff -> nested state; null deletes.
  function mergeDiffInto(state, diff){
    if (!state || !diff) return;
    for (var pth in diff){ if (!diff.hasOwnProperty(pth)) continue;
      var parts = pth.split('/').filter(Boolean), o = state, i;
      for (i = 0; i < parts.length - 1; i++){ if (typeof o[parts[i]] !== 'object' || o[parts[i]] === null) o[parts[i]] = {}; o = o[parts[i]]; }
      if (parts.length){ var leaf = parts[parts.length - 1]; if (diff[pth] === null){ try { delete o[leaf]; } catch(e){} } else o[leaf] = diff[pth]; }
    }
  }
  function showContent(html){
    stage.innerHTML = '';
    frame = document.createElement('iframe');
    frame.id = 'frame';
    // Sandbox: scripts run, opaque origin (no same-origin) — can postMessage out, can't touch us.
    frame.setAttribute('sandbox', 'allow-scripts');
    frame.srcdoc = html;
    // On load, replay the current state snapshot into the new component so it
    // initialises from live state (Memento), then future diffs keep it in sync.
    frame.addEventListener('load', function(){
      if (lastSnapshot && frame && frame.contentWindow)
        frame.contentWindow.postMessage({ source:'argus-host', type:'snapshot', state:lastSnapshot.state, version:lastSnapshot.version }, '*');
    });
    stage.appendChild(frame);
  }
  function showIdle(){ stage.innerHTML = '<div id="idle"><img class="ap-idle-brand" src="/branding/argus-presenter.svg" alt="Argus Presenter — awaiting content"></div>'; frame = null; }

  function onMessage(ev){
    var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    dbgLog(m);
    if (m.t === 'ping') { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'pong', ts:m.ts })); return; }   // X3 RTT
    if (m.t === 'chat_listeners') { updateChat(m.n); return; }   // P3
    if (m.t === 'welcome') { dbg.socketId = m.socketId || null; dbgRender(); }
    else if (m.t === 'snapshot') { lastSnapshot = m; if (typeof m.version === 'number') lastVersion = m.version; if (frame && frame.contentWindow) frame.contentWindow.postMessage({ source:'argus-host', type:'snapshot', state:m.state, version:m.version }, '*'); }
    else if (m.t === 'content') showContent(m.html);
    else if (m.t === 'clear') showIdle();
    else if (m.t === 'reload') setTimeout(function(){ location.reload(); }, m.delay || 0);
    else if (m.t === 'host') {
      if (m.msg && m.msg.type === 'diff') {
        if (typeof m.msg.version === 'number') lastVersion = Math.max(lastVersion, m.msg.version);
        if (m.msg.diff) {   // F1: fold the diff into the retained snapshot so late mounts seed from current state
          if (!lastSnapshot) lastSnapshot = { state: {}, version: (typeof m.msg.version === 'number' ? m.msg.version : lastVersion) };
          mergeDiffInto(lastSnapshot.state, m.msg.diff);
          if (typeof m.msg.version === 'number') lastSnapshot.version = m.msg.version;
        }
      }
      if (frame && frame.contentWindow) frame.contentWindow.postMessage(m.msg, '*');
    }
  }
  connect();

  // P3: bottom chat input — always present, enabled only when a listener is attached.
  function sendOp(path, verb, value){ if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'op', path:path, verb:verb, value:value, opId: identity.userId + ':' + Date.now() })); }
  function updateChat(n){ var en = (n|0) > 0; var i = document.getElementById('ap-chat-input'), b = document.getElementById('ap-chat-send'); if (i){ i.disabled = !en; i.placeholder = en ? 'type a message…' : 'chat (disabled until a listener is attached)'; } if (b) b.disabled = !en; }
  (function(){ var b = document.getElementById('ap-chat-send'), i = document.getElementById('ap-chat-input');
    function go(){ var v = i.value; if (!v || i.disabled) return; sendOp('chat', 'add', { id: identity.userId + '-' + Date.now(), text: v, name: identity.userName }); i.value = ''; }
    b.addEventListener('click', go);
    i.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); });
  })();
  window.__apChat = { enabled: function(){ return !document.getElementById('ap-chat-input').disabled; } };

  // X3: report client render errors to the telemetry sink.
  window.addEventListener('error', function(){ try { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'telemetry', kind:'render-error' })); } catch(e){} });

  // Relay bridge messages from the sandboxed component up to the server.
  // Ops (op protocol) go up as {t:'op'}; everything else as {t:'result'}.
  // (Diffs/snapshots flow DOWN via the m.t==='host'/'snapshot' handlers above.)
  window.addEventListener('message', function(e){
    var d = e.data;
    if (!d || d.source !== NS) return;
    if (frame && e.source !== frame.contentWindow) return;   // only our iframe
    if (ws.readyState !== 1) return;
    if (d.type === 'op') ws.send(JSON.stringify({ t:'op', path:d.path, verb:d.verb, value:d.value, opId:d.opId }));
    else ws.send(JSON.stringify({ t:'result', msg: d }));
  });

  // ---- Config Panel (Plan 0438 Group B, POC): click the green connectivity dot → settings overlay.
  // Two working controls (zoom + high-contrast, both transform the live display) + a connection readout.
  (function(){
    var STORE = NS + ':cfg';
    var cfg = { scale: 1, contrast: false };
    try { cfg = Object.assign(cfg, JSON.parse(localStorage.getItem(STORE) || '{}')); } catch(e){}
    var panel = document.getElementById('ap-config');
    var btn = document.getElementById('led-btn');
    function apply(){
      stage.style.setProperty('--ap-scale', cfg.scale);
      stage.style.setProperty('--ap-filter', cfg.contrast ? 'contrast(1.25) brightness(1.08)' : 'none');
      [].forEach.call(panel.querySelectorAll('[data-scale]'), function(b){ b.classList.toggle('sel', parseFloat(b.getAttribute('data-scale')) === cfg.scale); });
      var cb = document.getElementById('cfg-contrast'); cb.textContent = 'High-contrast: ' + (cfg.contrast ? 'on' : 'off'); cb.classList.toggle('sel', cfg.contrast);
      try { localStorage.setItem(STORE, JSON.stringify(cfg)); } catch(e){}
    }
    function readout(){
      document.getElementById('cfg-readout').innerHTML =
        '<span class="k">server</span> ' + location.host + '<br>' +
        '<span class="k">you</span> ' + identity.userName + ' (' + identity.userId + ')<br>' +
        '<span class="k">role</span> ' + identity.role + ' · <span class="k">link</span> ' + (ws && ws.readyState === 1 ? 'connected' : 'offline');
    }
    function toggle(open){ var show = (open === undefined) ? !panel.classList.contains('open') : open; panel.classList.toggle('open', show); if (show) readout(); }
    btn.addEventListener('click', function(e){ e.stopPropagation(); toggle(); });
    panel.addEventListener('click', function(e){ e.stopPropagation(); });
    document.addEventListener('click', function(){ toggle(false); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') toggle(false); });
    [].forEach.call(panel.querySelectorAll('[data-scale]'), function(b){ b.addEventListener('click', function(){ cfg.scale = parseFloat(b.getAttribute('data-scale')); apply(); }); });
    document.getElementById('cfg-contrast').addEventListener('click', function(){ cfg.contrast = !cfg.contrast; apply(); });
    document.getElementById('cfg-close').addEventListener('click', function(){ toggle(false); });

    // ---- Role picker (P4): become presenter/user without editing the URL.
    // Reflects identity.role in the .sel classes; on change persists to localStorage
    // and re-establishes the socket so a FRESH hello carries the new role (and token,
    // which satisfies the AUTH-1 gate when a control token is configured server-side).
    var roleUserBtn = document.getElementById('cfg-role-user');
    var rolePresBtn = document.getElementById('cfg-role-presenter');
    function reflectRole(){
      roleUserBtn.classList.toggle('sel', identity.role !== 'presenter');
      rolePresBtn.classList.toggle('sel', identity.role === 'presenter');
    }
    function setRole(role){
      if (role === identity.role) return;
      identity.role = role;
      try { localStorage.setItem(ROLE_KEY, role); } catch(e){}
      reflectRole(); renderWho(); readout();
      // Reconnect: onclose -> scheduleReconnect -> connect() re-sends hello w/ new role.
      if (ws && (ws.readyState === 0 || ws.readyState === 1)) { try { ws.close(); } catch(e){} }
      else { connect(); }
    }
    roleUserBtn.addEventListener('click', function(){ setRole('participant'); });
    rolePresBtn.addEventListener('click', function(){ setRole('presenter'); });
    reflectRole();

    apply();
    window.__apConfig = {
      role: function(){ return identity.role; },
      open: function(){ return panel.classList.contains('open'); },
      get: function(){ return cfg; }
    };
  })();
})();
</script>
</body>
</html>
