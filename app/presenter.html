<!doctype html>
<html lang="en" data-theme="argus">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus Presenter</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a1a;color:#cfe9ff;font-family:'Courier New',monospace;overflow:hidden;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;transform:scale(var(--ap-scale,1));transform-origin:center center;filter:var(--ap-filter,none);transition:transform .12s ease;}
  #frame{border:0;width:100%;height:100%;background:transparent;}
  #idle{opacity:.55;letter-spacing:.2em;font-size:.8rem;text-transform:uppercase;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
  #idle .ap-idle-brand{max-width:min(90vw,900px);max-height:90vh;width:auto;height:auto;}
  /* green connectivity dot is now a Settings button (larger hit target wraps the small dot) */
  #led-btn{position:fixed;top:4px;right:6px;z-index:60;background:none;border:0;padding:8px;cursor:pointer;line-height:0;border-radius:8px;}
  #led-btn:hover{background:rgba(255,255,255,.06);}
  #led{display:block;width:10px;height:10px;border-radius:50%;background:#cc3333;box-shadow:0 0 8px #cc3333;}
  /* P2.8: quick-switch to /control. Presenter-GRANTED only (welcome-gated, hidden otherwise).
     Top-LEFT corner, subtle; z 55 sits BELOW the config overlay (61) and control overlay (70). */
  #ap-goto-control{position:fixed;top:4px;left:6px;z-index:55;background:rgba(6,10,24,.7);color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:4px 9px;font:11px/1.4 'Courier New',monospace;letter-spacing:.06em;cursor:pointer;opacity:.45;}
  #ap-goto-control:hover{opacity:1;border-color:#22e5a0;}
  #led.on{background:#22e5a0;box-shadow:0 0 8px #22e5a0;}
  #ap-config{position:fixed;top:34px;right:8px;z-index:61;width:236px;background:rgba(6,10,24,.96);border:1px solid #2a3a5a;border-radius:8px;padding:10px 12px;font:12px/1.4 'Courier New',monospace;color:#cfe9ff;display:none;box-shadow:0 6px 24px rgba(0,0,0,.5);}
  #ap-config.open{display:block;}
  #ap-config h4{margin:0 0 6px;font-size:11px;letter-spacing:.12em;color:#6cf;text-transform:uppercase;}
  #ap-config .row{display:flex;gap:4px;align-items:center;margin:5px 0;flex-wrap:wrap;}
  #ap-config button{background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:5px;padding:3px 7px;font:inherit;cursor:pointer;}
  #ap-config button:hover{border-color:#22e5a0;}
  #ap-config button.sel{border-color:#22e5a0;color:#fff;}
  #ap-config input{background:#0d1633;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:5px;padding:3px 6px;font:inherit;flex:1 1 90px;min-width:80px;}
  #ap-config #cfg-role-msg{color:#f97;font-size:11px;flex-basis:100%;margin:0;}
  #ap-config .k{color:#8ab;}
  #ap-config .rd{font-size:11px;opacity:.85;margin-top:8px;border-top:1px solid #1c2a44;padding-top:6px;}
  /* Presenter-control expand/collapse overlay (P5): full-screen iframe host for /control */
  #ap-control-overlay{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;background:#040814;}
  #ap-control-overlay.open{display:flex;}
  #ap-control-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 12px;background:rgba(6,10,24,.96);border-bottom:1px solid #2a3a5a;font:12px/1.4 'Courier New',monospace;color:#6cf;letter-spacing:.1em;text-transform:uppercase;}
  #ap-control-bar button{background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:5px;padding:3px 9px;font:12px/1.4 'Courier New',monospace;cursor:pointer;}
  #ap-control-bar button:hover{border-color:#22e5a0;}
  #ap-control-frame{flex:1;width:100%;border:0;background:#040814;}
  #who{position:fixed;bottom:8px;left:12px;font-size:.65rem;opacity:.4;letter-spacing:.1em;}
  #ap-chat{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;padding:6px 10px 6px 130px;background:rgba(6,10,24,.85);border-top:1px solid #1c2a44;z-index:40;}
  #ap-chat input{flex:1 1 auto;background:#0d1633;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:5px 8px;font:inherit;}
  #ap-chat input:disabled{opacity:.5;}
  #ap-chat button{background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:5px 10px;font:inherit;cursor:pointer;}
  #ap-chat button:disabled{opacity:.5;cursor:default;}
  #ap-debug{position:fixed;top:26px;right:12px;width:340px;max-height:70vh;overflow:auto;background:rgba(6,10,24,.92);
    border:1px solid #2a3a5a;border-radius:6px;padding:8px 10px;font:11px/1.35 'Courier New',monospace;color:#9fd;z-index:50;}
  #ap-debug h4{margin:0 0 4px;font-size:11px;letter-spacing:.12em;color:#6cf;text-transform:uppercase;}
  #ap-debug .k{color:#8ab;}
  #ap-debug pre{margin:4px 0;white-space:pre-wrap;word-break:break-word;color:#cfe9ff;}
  #ap-debug .msg{border-top:1px solid #1c2a44;opacity:.85;}
  /* CHIME banner (MCP presenter_bell / presenter_verify_watching): gentle top-center pill so
     a backgrounded tab, once brought forward, shows why it dinged. Auto-clears on focus or click. */
  #ap-ready{position:fixed;top:0;left:0;right:0;z-index:80;display:none;justify-content:center;pointer-events:none;}
  #ap-ready.show{display:flex;}
  #ap-ready .pill{margin-top:18px;pointer-events:auto;cursor:pointer;display:flex;align-items:center;gap:12px;
    background:rgba(8,14,30,.96);border:1px solid #22e5a0;border-radius:12px;padding:12px 20px;
    box-shadow:0 6px 28px rgba(0,0,0,.55),0 0 20px rgba(34,229,160,.25);
    font:14px/1.4 'Courier New',monospace;color:#cfe9ff;letter-spacing:.04em;animation:ap-ready-in .3s ease;}
  #ap-ready .bell{font-size:20px;animation:ap-ready-ring 1.1s ease infinite;}
  #ap-ready .msg{font-weight:bold;color:#eafff6;}
  #ap-ready .sub{opacity:.6;font-size:12px;}
  #ap-ready .ap-ack{margin-left:6px;pointer-events:auto;cursor:pointer;background:#12341f;color:#8ef0a0;
    border:1px solid #22e5a0;border-radius:8px;padding:7px 14px;font:bold 13px/1 'Courier New',monospace;
    letter-spacing:.04em;white-space:nowrap;}
  #ap-ready .ap-ack:hover{background:#164a2a;color:#eafff6;}
  @keyframes ap-ready-in{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes ap-ready-ring{0%,60%,100%{transform:rotate(0)}70%{transform:rotate(14deg)}80%{transform:rotate(-10deg)}90%{transform:rotate(6deg)}}
  /* ATT (Plan 0466): attendance overlay — a big clean read-only roster (participant view: dots). */
  #ap-attendance{position:fixed;inset:6vh 8vw;z-index:82;background:rgba(6,10,24,.98);border:1px solid #2a3a5a;border-radius:12px;
    display:none;flex-direction:column;box-shadow:0 12px 44px rgba(0,0,0,.6);font:13px/1.5 'Courier New',monospace;color:#cfe9ff;}
  #ap-attendance.open{display:flex;}
  #att-bar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #21314f;}
  #att-bar span{font-size:15px;font-weight:bold;letter-spacing:.06em;}
  #att-bar button{margin-left:auto;background:#12234a;color:#cfe9ff;border:1px solid #2a3a5a;border-radius:6px;padding:5px 12px;font:inherit;cursor:pointer;}
  #att-bar button:hover{border-color:#22e5a0;}
  #att-list{flex:1 1 auto;overflow:auto;padding:12px 18px;}
  #att-list .att-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid #12203a;}
  #att-list .att-name{font-weight:bold;color:#eafff6;}
  #att-list .att-role{font-size:11px;color:#8ab;border:1px solid #2a3a5a;border-radius:8px;padding:0 6px;}
  #att-summary{padding:10px 18px;border-top:1px solid #21314f;font-size:12px;color:#8ab;}
  .att-dot{display:inline-block;width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
</style>
</head>
<body>
<button id="led-btn" title="Settings" aria-haspopup="true" aria-label="Connection and settings"><span id="led"></span></button>
<button id="ap-goto-control" title="Open (or refocus) the presenter control window" style="display:none">⧉ Control</button>
<div id="ap-config" role="dialog" aria-label="Settings">
  <h4>Display</h4>
  <div class="row"><span class="k">Zoom</span> <button data-scale="0.9">90%</button><button data-scale="1">100%</button><button data-scale="1.25">125%</button><button data-scale="1.5">150%</button></div>
  <div class="row"><span class="k">Contrast</span> <button id="cfg-contrast">High-contrast: off</button></div>
  <div class="row"><span class="k">Role</span> <button id="cfg-role-user" class="sel">User</button> <button id="cfg-role-presenter">Presenter</button></div>
  <div class="row" id="cfg-role-pwgroup" style="display:none"><input id="cfg-role-pw" type="password" placeholder="presenter password" autocomplete="off"> <button id="cfg-role-go">Unlock</button><span id="cfg-role-msg"></span></div>
  <div class="row" id="cfg-control-row" style="display:none"><button id="cfg-open-control">▮ Show Presenter Control</button></div>
  <div class="row" style="margin-top:8px"><button id="cfg-attendance">👁 Show attendance</button></div>
  <div class="rd" id="cfg-readout"></div>
  <div class="row" style="margin-top:8px"><button id="cfg-close">Close</button></div>
</div>
<!-- ATT (Plan 0466 §2.7, reworked Plan 0468): attendance overlay — participant render = names · role ·
     connection-liveness dot (🟢 connected / 🔴 offline) + 👁 when confirmed watching. Read-only "who's in
     the room". Hidden until opened; request/reply. -->
<div id="ap-attendance" role="dialog" aria-label="Attendance">
  <div id="att-bar"><span>Who's here</span><button id="att-close">✕ Close</button></div>
  <div id="att-list"></div>
  <div id="att-summary"></div>
</div>
<div id="ap-control-overlay" role="dialog" aria-label="Presenter Control">
  <div id="ap-control-bar"><span>Presenter Control</span><button id="ap-control-close">✕ Close</button></div>
  <!-- #ap-control-frame is created lazily on expand and removed on collapse, so the
       display page carries NO extra child browsing context while idle (a persistent
       iframe would pollute the "does this page have a content frame?" invariant). -->
</div>
<div id="ap-ready" aria-live="polite"><div class="pill" role="status"><span class="bell">🔔</span><span><span class="msg">Ready to start?</span> <span class="sub">— bring me forward, then tell me to go.</span></span><button class="ap-ack" type="button" style="display:none">✓ I'm watching</button></div></div>
<div id="stage"><div id="idle"><img class="ap-idle-brand" src="/branding/argus-presenter.svg" alt="Argus Presenter — awaiting content"></div></div>
<div id="who"></div>
<div id="ap-chat"><input id="ap-chat-input" disabled placeholder="chat (disabled until a listener is attached)"><button id="ap-chat-send" disabled>Send</button></div>
<script>
(function(){
  var NS = 'argus-presenter';
  var q = new URLSearchParams(location.search);
  // Role precedence: explicit URL ?role= wins; else a role the viewer chose earlier
  // (persisted in localStorage via the Config overlay); else default participant.
  var ROLE_KEY = NS + ':role';
  var savedRole = null;
  try { savedRole = localStorage.getItem(ROLE_KEY); } catch(e){}
  var identity = {
    userId: q.get('userId') || q.get('u') || ('anon-' + Math.random().toString(36).slice(2,8)),
    userName: q.get('name') || q.get('n') || 'Guest',
    role: q.get('role') || savedRole || 'participant',
    // Token pass-through: when a PRESENTER_CONTROL_TOKEN is configured server-side,
    // ?token=… in the URL satisfies the AUTH-1 gate for a control role. Default: none (open).
    token: q.get('token') || null
  };
  function renderWho(){ document.getElementById('who').textContent = identity.role + ' · ' + identity.userName + ' (' + identity.userId + ')'; }
  renderWho();

  // AUTH-ROLE (P5.5): is the presenter role password-gated, and what public salt does the
  // browser hash with? Default UNGATED on fetch failure. The Role picker (below) reads these.
  var authGated = false, authSeed = 'argus-presenter';
  fetch('/api/auth').then(function(r){ return r.json(); })
    .then(function(d){ authGated = !!(d && d.gated); if (d && d.seed) authSeed = d.seed; })
    .catch(function(){ authGated = false; });
  // Set by the Role picker; called from the `welcome` handler with the server's EFFECTIVE
  // granted role so a silent downgrade (wrong password) surfaces as feedback.
  var onWelcomeRole = null;

  // ---- P2.8: quick-switch button to /control (reciprocal of control.html's #btn-present).
  // Visibility is gated on the EFFECTIVE role the server granted in `welcome`, NOT the
  // requested one: a silent downgrade (wrong/absent credential) must hide the button.
  // identity.role is ALSO required so switching to User hides it immediately (pre-reconnect).
  var grantedRole = null;   // last welcome-echoed role; null until a welcome arrives
  function updateGotoControl(){
    var b = document.getElementById('ap-goto-control');
    if (b) b.style.display = (grantedRole === 'presenter' && identity.role === 'presenter') ? '' : 'none';
  }
  document.getElementById('ap-goto-control').addEventListener('click', function(){
    // Reuse THIS page's credential (identity.token: URL param or role-picker hash); never hardcode.
    var url = '/control?role=presenter';
    if (identity.token) url += '&token=' + encodeURIComponent(identity.token);
    // NAMED target: two-way pair with control.html's 'presenter-display' — reopening
    // FOCUSES the same window instead of spawning duplicates.
    var w = window.open(url, 'presenter-control');
    if (w) { try { w.focus(); } catch(e){} }
  });

  var stage = document.getElementById('stage');
  var led = document.getElementById('led');
  var frame = null;

  // ---- Debug overlay (?debug=1): connection, socketId, last N ops/messages, state inspector.
  var DEBUG = q.get('debug') === '1' || q.get('debug') === 'true';
  var dbg = { open: false, socketId: null, msgs: [], state: {} };
  var dbgEl = null;
  function dbgGet(path) { var o = dbg.state; (path || '').split('/').filter(Boolean).forEach(function (k) { o = (o && typeof o === 'object') ? o[k] : undefined; }); return o; }
  function dbgMerge(diff) { if (!diff || typeof diff !== 'object') return; for (var p in diff) { if (!diff.hasOwnProperty(p)) continue; var parts = p.split('/').filter(Boolean), o = dbg.state; for (var i = 0; i < parts.length - 1; i++) { if (typeof o[parts[i]] !== 'object' || o[parts[i]] === null) o[parts[i]] = {}; o = o[parts[i]]; } if (parts.length) o[parts[parts.length - 1]] = diff[p]; } }
  function dbgRender() {
    if (!DEBUG) return;
    if (!dbgEl) { dbgEl = document.createElement('div'); dbgEl.id = 'ap-debug'; document.body.appendChild(dbgEl); }
    // Plan 0471 M1: HTML-escape every value before innerHTML. JSON.stringify escapes " but
    // not <>, so peer-authored state (a marker label / answer of `</pre><img onerror=…>`,
    // reachable via a diff) would otherwise execute JS in the ?debug overlay.
    var last = dbg.msgs.slice(-8).map(function (m) { return '<div class="msg"><span class="k">' + attEscape(m.t) + '</span> ' + attEscape(m.brief || '') + '</div>'; }).join('');
    dbgEl.innerHTML =
      '<h4>Argus Debug</h4>' +
      '<div><span class="k">conn</span> ' + (dbg.open ? 'open' : 'closed') + ' · <span class="k">socket</span> ' + attEscape(dbg.socketId || '—') + '</div>' +
      '<div><span class="k">role</span> ' + attEscape(identity.role) + ' · <span class="k">user</span> ' + attEscape(identity.userId) + '</div>' +
      '<h4 style="margin-top:6px">state</h4><pre>' + attEscape(JSON.stringify(dbg.state, null, 1).slice(0, 1200)) + '</pre>' +
      '<h4>last messages</h4>' + last;
  }
  function dbgLog(m) {
    if (!DEBUG) return;
    var brief = '';
    if (m.t === 'op' || m.t === 'diff') brief = JSON.stringify(m.diff || m.value || {}).slice(0, 80);
    else if (m.t === 'content') brief = (m.contentId || '') + '';
    else if (m.t === 'host') brief = (m.msg && m.msg.type) || '';
    dbg.msgs.push({ t: m.t, brief: brief });
    if (dbg.msgs.length > 40) dbg.msgs.shift();
    if (m.t === 'diff' && m.diff) dbgMerge(m.diff);
    if (m.t === 'host' && m.msg && m.msg.type === 'diff' && m.msg.diff) dbgMerge(m.msg.diff);
    if (m.t === 'snapshot' && m.state) dbg.state = m.state;
    dbgRender();
  }
  // Expose for tests / manual poking.
  window.__apDebug = { get: dbgGet, dump: function () { return dbg; } };

  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var ws = null;
  var lastVersion = 0;            // highest state version this client has applied (X1 resync)
  var reconnectDelay = 300, reconnectTimer = null;
  function scheduleReconnect(){
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function(){ reconnectTimer = null; connect(); }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 5000);   // backoff (X6 storm debounce)
  }
  function connect(){
    ws = new WebSocket(proto + '://' + location.host);
    ws.onopen = function(){ led.classList.add('on'); dbg.open = true; dbgRender(); reconnectDelay = 300;
      ws.send(JSON.stringify(Object.assign({ t:'hello', lastVersion:lastVersion }, identity))); };
    ws.onclose = function(){ led.classList.remove('on'); dbg.open = false; dbgRender(); scheduleReconnect(); };
    ws.onerror = function(){ /* onclose handles reconnect */ };
    ws.onmessage = onMessage;
  }

  var lastSnapshot = null;   // most recent server snapshot (relayed into new content frames)
  // F1: keep lastSnapshot CURRENT by merging live diffs into it, so a late-mounted
  // component seeds from present state (e.g. poll-results pushed AFTER votes arrived
  // shows the real tally, not 0). Path-keyed diff -> nested state; null deletes.
  function mergeDiffInto(state, diff){
    if (!state || !diff) return;
    for (var pth in diff){ if (!diff.hasOwnProperty(pth)) continue;
      var parts = pth.split('/').filter(Boolean), o = state, i;
      for (i = 0; i < parts.length - 1; i++){ if (typeof o[parts[i]] !== 'object' || o[parts[i]] === null) o[parts[i]] = {}; o = o[parts[i]]; }
      if (parts.length){ var leaf = parts[parts.length - 1]; if (diff[pth] === null){ try { delete o[leaf]; } catch(e){} } else o[leaf] = diff[pth]; }
    }
  }
  function showContent(html){
    stage.innerHTML = '';
    frame = document.createElement('iframe');
    frame.id = 'frame';
    // Sandbox: scripts run, opaque origin (no same-origin) — can postMessage out, can't touch us.
    frame.setAttribute('sandbox', 'allow-scripts');
    frame.srcdoc = html;
    // On load, replay the current state snapshot into the new component so it
    // initialises from live state (Memento), then future diffs keep it in sync.
    frame.addEventListener('load', function(){
      if (lastSnapshot && frame && frame.contentWindow)
        frame.contentWindow.postMessage({ source:'argus-host', type:'snapshot', state:lastSnapshot.state, version:lastSnapshot.version }, '*');
    });
    stage.appendChild(frame);
  }
  function showIdle(){ stage.innerHTML = '<div id="idle"><img class="ap-idle-brand" src="/branding/argus-presenter.svg" alt="Argus Presenter — awaiting content"></div>'; frame = null; }

  function onMessage(ev){
    var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    dbgLog(m);
    if (m.t === 'ping') { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'pong', ts:m.ts })); return; }   // X3 RTT
    if (m.t === 'chat_listeners') { updateChat(m.n); return; }   // P3
    if (m.t === 'welcome') { dbg.socketId = m.socketId || null; dbgRender(); grantedRole = (typeof m.role === 'string') ? m.role : null; if (typeof onWelcomeRole === 'function') onWelcomeRole(m.role); updateGotoControl(); }
    else if (m.t === 'snapshot') { lastSnapshot = m; if (typeof m.version === 'number') lastVersion = m.version; if (frame && frame.contentWindow) frame.contentWindow.postMessage({ source:'argus-host', type:'snapshot', state:m.state, version:m.version }, '*'); }
    else if (m.t === 'content') showContent(m.html);
    else if (m.t === 'clear') showIdle();
    else if (m.t === 'reload') setTimeout(function(){ location.reload(); }, m.delay || 0);
    else if (m.t === 'chime') { onChime(m); }
    else if (m.t === 'attendance') { onAttendance(m); }
    else if (m.t === 'host') {
      if (m.msg && m.msg.type === 'diff') {
        if (typeof m.msg.version === 'number') lastVersion = Math.max(lastVersion, m.msg.version);
        if (m.msg.diff) {   // F1: fold the diff into the retained snapshot so late mounts seed from current state
          if (!lastSnapshot) lastSnapshot = { state: {}, version: (typeof m.msg.version === 'number' ? m.msg.version : lastVersion) };
          mergeDiffInto(lastSnapshot.state, m.msg.diff);
          if (typeof m.msg.version === 'number') lastSnapshot.version = m.msg.version;
        }
      }
      if (frame && frame.contentWindow) frame.contentWindow.postMessage(m.msg, '*');
    }
  }
  connect();

  // ---- CHIME (server {t:'chime'} ← MCP presenter_bell / presenter_verify_watching) ----------------
  // The human keeps this tab in the background while the AI builds a deck; a gentle
  // audible cue + tab-title flash + on-screen pill says "deck is ready, come look".
  // WebAudio keeps running in a backgrounded tab, but autoplay policy needs the
  // context unlocked by a prior user gesture — so we resume it on any interaction.
  var apAudio = null;
  function apEnsureAudio(){
    try {
      if (!apAudio) apAudio = new (window.AudioContext || window.webkitAudioContext)();
      if (apAudio.state === 'suspended') apAudio.resume().catch(function(){});
    } catch(e){ apAudio = null; }
    return apAudio;
  }
  ['pointerdown','keydown','touchstart'].forEach(function(ev){
    window.addEventListener(ev, apEnsureAudio, { passive:true });   // keep the context warm on every gesture
  });
  function apBell(ctx, freq, t0, dur, gain){
    var o = ctx.createOscillator(), g = ctx.createGain();           // fundamental
    var o2 = ctx.createOscillator(), g2 = ctx.createGain();         // soft octave partial for a bell timbre
    o.type = 'sine'; o.frequency.value = freq;
    o2.type = 'sine'; o2.frequency.value = freq * 2.01;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    g2.gain.setValueAtTime(0.0001, t0);
    g2.gain.linearRampToValueAtTime(gain * 0.22, t0 + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.55);
    o.connect(g).connect(ctx.destination); o2.connect(g2).connect(ctx.destination);
    o.start(t0); o.stop(t0 + dur); o2.start(t0); o2.stop(t0 + dur * 0.55);
  }
  function apPlayChime(){
    var ctx = apEnsureAudio(); if (!ctx) return;                    // no audio (e.g. never interacted) → silent, banner still shows
    var t = ctx.currentTime + 0.03;
    // gentle ascending A-major arpeggio (A4, C#5, E5) — a warm "ready-to-go"
    apBell(ctx, 440.00, t,        0.95, 0.16);
    apBell(ctx, 554.37, t + 0.14, 1.05, 0.15);
    apBell(ctx, 659.25, t + 0.28, 1.25, 0.15);
  }
  // Tab-title flash so a backgrounded tab visibly signals in the tab strip.
  var apTitleTimer = null, apOrigTitle = document.title;
  function apStartTitleFlash(){
    if (apTitleTimer) return;
    var on = true;
    apTitleTimer = setInterval(function(){ document.title = on ? '🔔 Ready to start?' : apOrigTitle; on = !on; }, 1000);
  }
  function apStopTitleFlash(){ if (apTitleTimer){ clearInterval(apTitleTimer); apTitleTimer = null; } document.title = apOrigTitle; }
  var apReadyEl = document.getElementById('ap-ready');
  var apAckBtn = apReadyEl ? apReadyEl.querySelector('.ap-ack') : null;
  var apAckId = 'ready';
  function apShowReady(message, requireAck, ackId){
    var msgEl = apReadyEl.querySelector('.msg'); if (msgEl && message) msgEl.textContent = message;
    apAckId = ackId || 'ready';
    if (apAckBtn){ apAckBtn.style.display = requireAck ? '' : 'none'; apAckBtn.textContent = "✓ I'm watching"; apAckBtn.disabled = false; }
    apReadyEl.classList.add('show');
  }
  // CONFIRM button = eyes-on acknowledgement (proves not-AFK). Sends {t:'ack'} to the server,
  // which records it in presence so the Control User sees eyes-on. Also unlocks audio.
  if (apAckBtn) apAckBtn.addEventListener('click', function(e){
    e.stopPropagation();                                       // don't let the pill's dismiss handler swallow it
    apEnsureAudio();
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'ack', ackId: apAckId }));
    apAckBtn.textContent = '✓ Confirmed — thanks'; apAckBtn.disabled = true;
    apStopTitleFlash();
    setTimeout(apClearReady, 1200);
  });
  var apReadyTimer = null;
  function apClearReady(){ apReadyEl.classList.remove('show'); apStopTitleFlash(); if (apReadyTimer){ clearTimeout(apReadyTimer); apReadyTimer = null; } }
  if (apReadyEl) apReadyEl.addEventListener('click', apClearReady);   // click the pill to dismiss
  // Foregrounding the tab stops the tab-title flash, but the banner MUST persist — the
  // whole point is the human sees "Ready to start?" when they arrive. Clearing on focus
  // would erase the banner the instant they look (the bug that made it read as "nothing").
  function apOnForeground(){ apStopTitleFlash(); apEnsureAudio(); }   // also try to (re)arm audio when they return
  window.addEventListener('focus', apOnForeground);
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) apOnForeground(); });
  function onChime(m){
    var requireAck = !!(m && m.requireAck);
    if (!(m && m.bell === false)) apPlayChime();   // bell:false = silent ask (banner only, no audio)
    apShowReady(m && m.message, requireAck, m && m.ackId);
    if (document.hidden) apStartTitleFlash();   // flash the tab title only while backgrounded
    if (apReadyTimer) { clearTimeout(apReadyTimer); apReadyTimer = null; }
    // A plain ding auto-dismisses after 60s; an eyes-on REQUEST persists until the viewer confirms.
    if (!requireAck) apReadyTimer = setTimeout(apClearReady, 60000);
    dbg.lastChime = (m && m.message) || 'ready';
  }

  // ---- ATT (Plan 0466 §2.7, reworked Plan 0468): attendance overlay (participant render — name/role/dot) ----
  // Request/reply, NO standing feed: on open we ask, then re-request every ~2s; closing stops it.
  // The server redacts by our role — participants get names + role + connected + eyesOn; the whole
  // overlay stays hidden until opened. Gate OFF ⇒ the server answers self-only (handled server-side).
  var attEl = document.getElementById('ap-attendance');
  var attReqTimer = null;
  // Plan 0468: the dot is CONNECTION LIVENESS only — green connected, red present-but-stale. No yellow/idle.
  function attDotColor(connected){ return connected ? '#22e5a0' : '#ff6b6b'; }
  function attEscape(s){ return (s == null ? '' : ('' + s)).replace(/[&<>"]/g, function(ch){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[ch]; }); }
  function attRequest(){ if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'attendance-request' })); }
  function openAttendance(){
    document.getElementById('ap-config').classList.remove('open');   // came from Config → close it
    attEl.classList.add('open');
    attRequest();
    if (!attReqTimer) attReqTimer = setInterval(attRequest, 2000);
  }
  function closeAttendance(){ attEl.classList.remove('open'); if (attReqTimer){ clearInterval(attReqTimer); attReqTimer = null; } }
  function onAttendance(m){
    if (!attEl.classList.contains('open')) return;   // ignore late replies after close
    var roster = (m && m.roster) || [], sm = (m && m.summary) || {};
    document.getElementById('att-list').innerHTML = roster.map(function(r){
      // Plan 0468: dot from r.connected; 👁 badge when r.eyesOn (explicit verify_watching CONFIRM). No r.status.
      var eyes = r.eyesOn ? ' <span class="att-eyes" title="confirmed watching">👁</span>' : '';
      return '<div class="att-row"><span class="att-dot" style="background:' + attDotColor(r.connected) + '" title="' + (r.connected ? 'connected' : 'offline') + '"></span>'
        + '<span class="att-name">' + attEscape(r.userName || r.userId) + '</span>'
        + '<span class="att-role">' + attEscape(r.role) + '</span>' + eyes + '</div>';
    }).join('') || '<div style="opacity:.6">(no one else visible)</div>';
    document.getElementById('att-summary').textContent =
      '🟢 ' + (sm.connected || 0) + ' connected · 🔴 ' + (sm.offline || 0) + ' offline · 👁 ' + (sm.eyesOn || 0) + ' confirmed · ' + (sm.total || 0) + ' total';
  }
  (function(){
    var open = document.getElementById('cfg-attendance'); if (open) open.addEventListener('click', function(e){ e.stopPropagation(); openAttendance(); });
    var close = document.getElementById('att-close'); if (close) close.addEventListener('click', function(e){ e.stopPropagation(); closeAttendance(); });
    if (attEl) attEl.addEventListener('click', function(e){ e.stopPropagation(); });   // don't let clicks bubble to the config click-away closer
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && attEl.classList.contains('open')) closeAttendance(); });
  })();

  // P3: bottom chat input — always present, enabled only when a listener is attached.
  function sendOp(path, verb, value){ if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'op', path:path, verb:verb, value:value, opId: identity.userId + ':' + Date.now() })); }
  function updateChat(n){ var en = (n|0) > 0; var i = document.getElementById('ap-chat-input'), b = document.getElementById('ap-chat-send'); if (i){ i.disabled = !en; i.placeholder = en ? 'type a message…' : 'chat (disabled until a listener is attached)'; } if (b) b.disabled = !en; }
  (function(){ var b = document.getElementById('ap-chat-send'), i = document.getElementById('ap-chat-input');
    function go(){ var v = i.value; if (!v || i.disabled) return; sendOp('chat', 'add', { id: identity.userId + '-' + Date.now(), text: v, name: identity.userName }); i.value = ''; }
    b.addEventListener('click', go);
    i.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); });
  })();
  window.__apChat = { enabled: function(){ return !document.getElementById('ap-chat-input').disabled; } };

  // X3: report client render errors to the telemetry sink.
  window.addEventListener('error', function(){ try { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t:'telemetry', kind:'render-error' })); } catch(e){} });

  // Relay bridge messages from the sandboxed component up to the server.
  // Ops (op protocol) go up as {t:'op'}; everything else as {t:'result'}.
  // (Diffs/snapshots flow DOWN via the m.t==='host'/'snapshot' handlers above.)
  window.addEventListener('message', function(e){
    var d = e.data;
    if (!d || d.source !== NS) return;
    if (frame && e.source !== frame.contentWindow) return;   // only our iframe
    if (ws.readyState !== 1) return;
    if (d.type === 'op') ws.send(JSON.stringify({ t:'op', path:d.path, verb:d.verb, value:d.value, opId:d.opId }));
    else ws.send(JSON.stringify({ t:'result', msg: d }));
  });

  // ---- Config Panel (Plan 0438 Group B, POC): click the green connectivity dot → settings overlay.
  // Two working controls (zoom + high-contrast, both transform the live display) + a connection readout.
  (function(){
    var STORE = NS + ':cfg';
    var cfg = { scale: 1, contrast: false };
    try { cfg = Object.assign(cfg, JSON.parse(localStorage.getItem(STORE) || '{}')); } catch(e){}
    var panel = document.getElementById('ap-config');
    var btn = document.getElementById('led-btn');
    function apply(){
      stage.style.setProperty('--ap-scale', cfg.scale);
      stage.style.setProperty('--ap-filter', cfg.contrast ? 'contrast(1.25) brightness(1.08)' : 'none');
      [].forEach.call(panel.querySelectorAll('[data-scale]'), function(b){ b.classList.toggle('sel', parseFloat(b.getAttribute('data-scale')) === cfg.scale); });
      var cb = document.getElementById('cfg-contrast'); cb.textContent = 'High-contrast: ' + (cfg.contrast ? 'on' : 'off'); cb.classList.toggle('sel', cfg.contrast);
      try { localStorage.setItem(STORE, JSON.stringify(cfg)); } catch(e){}
    }
    function readout(){
      document.getElementById('cfg-readout').innerHTML =
        '<span class="k">server</span> ' + location.host + '<br>' +
        '<span class="k">you</span> ' + identity.userName + ' (' + identity.userId + ')<br>' +
        '<span class="k">role</span> ' + identity.role + ' · <span class="k">link</span> ' + (ws && ws.readyState === 1 ? 'connected' : 'offline');
    }
    function toggle(open){ var show = (open === undefined) ? !panel.classList.contains('open') : open; panel.classList.toggle('open', show); if (show) readout(); }
    btn.addEventListener('click', function(e){ e.stopPropagation(); toggle(); });
    panel.addEventListener('click', function(e){ e.stopPropagation(); });
    document.addEventListener('click', function(){ toggle(false); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') toggle(false); });
    [].forEach.call(panel.querySelectorAll('[data-scale]'), function(b){ b.addEventListener('click', function(){ cfg.scale = parseFloat(b.getAttribute('data-scale')); apply(); }); });
    document.getElementById('cfg-contrast').addEventListener('click', function(){ cfg.contrast = !cfg.contrast; apply(); });
    document.getElementById('cfg-close').addEventListener('click', function(){ toggle(false); });

    // ---- Role picker (P4): become presenter/user without editing the URL.
    // Reflects identity.role in the .sel classes; on change persists to localStorage
    // and re-establishes the socket so a FRESH hello carries the new role (and token,
    // which satisfies the AUTH-1 gate when a control token is configured server-side).
    var roleUserBtn = document.getElementById('cfg-role-user');
    var rolePresBtn = document.getElementById('cfg-role-presenter');
    var controlRow = document.getElementById('cfg-control-row');
    function reflectRole(){
      roleUserBtn.classList.toggle('sel', identity.role !== 'presenter');
      rolePresBtn.classList.toggle('sel', identity.role === 'presenter');
      // Only a presenter has a control panel; participants get no button.
      var isPres = identity.role === 'presenter';
      controlRow.style.display = isPres ? '' : 'none';
      var ocb = document.getElementById('cfg-open-control'); if (ocb) ocb.disabled = !isPres;
      updateGotoControl();   // P2.8: quick-switch button tracks role changes too
    }
    function setRole(role){
      if (role === identity.role) return;
      identity.role = role;
      try { localStorage.setItem(ROLE_KEY, role); } catch(e){}
      reflectRole(); renderWho(); readout();
      // Reconnect: onclose -> scheduleReconnect -> connect() re-sends hello w/ new role.
      if (ws && (ws.readyState === 0 || ws.readyState === 1)) { try { ws.close(); } catch(e){} }
      else { connect(); }
    }
    // ---- AUTH-ROLE (P5.5): inline password gate on the Presenter switch.
    // When the server is gated, clicking Presenter reveals a password field instead of
    // switching immediately. On Unlock we hash the password IN THE BROWSER (WebCrypto) and
    // send only sha256(seed+password) as the hello token — the plaintext never leaves.
    // (crypto.subtle needs a secure context: localhost/https qualify; plain-LAN-http is out
    // of scope for this gate — deployers front it with https or a tunnel.)
    var pwGroup = document.getElementById('cfg-role-pwgroup');
    var pwInput = document.getElementById('cfg-role-pw');
    var pwMsg = document.getElementById('cfg-role-msg');
    var attempting = null;   // the role we're waiting for the server to CONFIRM via welcome
    function showPwGroup(show){ pwGroup.style.display = show ? '' : 'none'; if (show){ pwMsg.textContent = ''; try { pwInput.focus(); } catch(e){} } }
    async function computeHash(pw){
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(authSeed + pw));
      return [].map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }
    async function unlock(){
      var pw = pwInput.value || '';
      try { identity.token = await computeHash(pw); }
      catch(e){ pwMsg.textContent = 'cannot hash (insecure context)'; return; }
      attempting = 'presenter';
      // setRole short-circuits if role is unchanged; force through when already presenter-attempt.
      if (identity.role === 'presenter') { if (ws && (ws.readyState===0||ws.readyState===1)){ try{ws.close();}catch(e){} } else connect(); }
      else setRole('presenter');
    }
    roleUserBtn.addEventListener('click', function(){ attempting = null; identity.token = null; pwMsg.textContent = ''; showPwGroup(false); setRole('participant'); });
    rolePresBtn.addEventListener('click', function(){
      if (!authGated) { attempting = 'presenter'; setRole('presenter'); }   // ungated → immediate (P4 behavior)
      else { showPwGroup(true); }                                            // gated → reveal pw field, don't switch yet
    });
    document.getElementById('cfg-role-go').addEventListener('click', function(){ unlock(); });
    pwInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') unlock(); });

    // The server echoes the EFFECTIVE granted role in `welcome`. Sync identity.role to it and,
    // if we were attempting Presenter, translate a silent downgrade into visible feedback.
    onWelcomeRole = function(effRole){
      if (typeof effRole !== 'string') return;
      var wasAttempting = attempting;
      identity.role = effRole;
      try { localStorage.setItem(ROLE_KEY, effRole === 'presenter' ? 'presenter' : 'participant'); } catch(e){}
      if (wasAttempting === 'presenter'){
        attempting = null;
        if (effRole === 'presenter'){ showPwGroup(false); pwInput.value = ''; pwMsg.textContent = ''; }   // granted
        else { pwMsg.textContent = 'wrong password'; identity.token = null; }                             // denied → revert to User
      }
      reflectRole(); renderWho(); readout();
    };
    reflectRole();

    // ---- Presenter-control expand/collapse (P5). The control overlay hosts the
    // SAME-ORIGIN /control page in a NON-sandboxed iframe (its ws/fetch resolve to
    // 'self' → allowed by CSP frame-src/connect-src 'self'). Expanding "grows" from
    // the Config panel; closing SHRINKS BACK to it. The base display socket is never
    // touched. The iframe is created on open and REMOVED on close, so control.html's
    // ws + rAF stop and no phantom child browsing context lingers (cf. MON-2).
    var controlOverlay = document.getElementById('ap-control-overlay');
    function openControl(){
      var url = '/control?role=presenter';
      if (identity.token) url += '&token=' + encodeURIComponent(identity.token);
      // Create the iframe lazily (NO sandbox → same-origin → its ws/fetch resolve to
      // 'self' and pass CSP). Existing only while expanded means the idle display page
      // has no phantom child frame.
      var f = document.getElementById('ap-control-frame');
      if (!f) { f = document.createElement('iframe'); f.id = 'ap-control-frame'; f.setAttribute('name', 'ap-control-frame'); f.setAttribute('title', 'Presenter Control'); controlOverlay.appendChild(f); }
      f.setAttribute('src', url);
      controlOverlay.classList.add('open');
      toggle(false);   // close Config so the overlay visually expands from it
    }
    function closeControl(){
      controlOverlay.classList.remove('open');
      // Remove the iframe entirely: tears down control.html's ws + rAF AND drops the
      // child browsing context (cf. MON-2 — no hidden-but-live leak).
      var f = document.getElementById('ap-control-frame');
      if (f) f.remove();
      toggle(true);    // shrink back to the Config panel
    }
    document.getElementById('cfg-open-control').addEventListener('click', function(e){ e.stopPropagation(); openControl(); });
    document.getElementById('ap-control-close').addEventListener('click', function(e){ e.stopPropagation(); closeControl(); });

    apply();
    window.__apConfig = {
      role: function(){ return identity.role; },   // EFFECTIVE (welcome-confirmed) role
      open: function(){ return panel.classList.contains('open'); },
      gated: function(){ return authGated; },
      get: function(){ return cfg; }
    };
    window.__apControl = {
      open: function(){ return controlOverlay.classList.contains('open'); },
      frameSrc: function(){ var f = document.getElementById('ap-control-frame'); return (f && f.getAttribute('src')) || ''; }
    };
  })();
})();
</script>
</body>
</html>
